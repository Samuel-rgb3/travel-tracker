<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Travel Tracker</title>

</head>
<body>
    <main class="container">
        <header>
            <h1>Travel Tracker</h1>
            <div class="painel-total">
                <p>Total Gasto (BRL)</p>
                <h2 id="total-brl">R$ 0,00</h2>
            </div>
        </header>
        
        <section class="formulario">
            <input type="text" id="desc-despesa" placeholder="Descrição">

            <div class="linha-inputs">
                <input type="number" id="valor-gringo" placeholder="Valor ($/€)" step="0.01">
                <input type="number" id="cotacao" placeholder="Cotação (R$)" step="0.01">
            </div>

            <button id="btn-adicionar">Adicionar Despesa</button>
        </section>

        <section class="lista-container">
            <h3>Minhas Despesas</h3>
            <ul id="lista-despesas">
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
